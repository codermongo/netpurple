<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="darkreader-lock" />
    <title>Tierlists | NetPurple</title>
    <meta name="description" content="Browse all tierlists on NetPurple: Anime, Series, and Games rankings." />
    <meta name="keywords" content="tierlist, anime ranking, series ranking, games ranking, NetPurple">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="author" content="NetPurple" />
    <link rel="canonical" href="https://www.netpurple.com/tier/" />
    <meta name="theme-color" content="#121224" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta property="og:title" content="Tierlists | NetPurple" />
    <meta property="og:description" content="Browse all tierlists on NetPurple: Anime, Series, and Games rankings." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NetPurple" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://www.netpurple.com/tier/" />
    <meta property="og:image" content="https://www.netpurple.com/logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tierlists | NetPurple" />
    <meta name="twitter:description" content="Browse all tierlists on NetPurple: Anime, Series, and Games rankings." />
    <meta name="twitter:image" content="https://www.netpurple.com/logo.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <style>
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
      }

      .services {
        padding: 20px 0 60px 0;
        background: transparent;
        min-height: 45vh;
        display: flex;
        align-items: center;
        position: relative;
        z-index: 1;
      }

      .tools-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(1, 1fr);
        gap: 1.5rem;
        max-width: 1200px;
        margin-left: auto;
        margin-right: auto;
        width: 100%;
      }

      .tool-card {
        background: var(--card-glass-bg);
        backdrop-filter: blur(8px) saturate(120%);
        -webkit-backdrop-filter: blur(8px) saturate(120%);
        border: 1px solid var(--card-glass-stroke);
        border-radius: 12px;
        padding: 1.5rem;
        text-align: center;
        transition: all 0.3s ease;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        box-shadow: 0 10px 30px rgba(59, 130, 246, 0.08);
      }

      .tool-card::before,
      .tool-card:hover::before,
      .tool-card:active::before,
      .tool-card:focus-visible::before {
        content: none;
      }

      .tool-card:hover {
        transform: translateY(-5px);
        border-color: rgba(99, 102, 241, 0.35);
        background: var(--card-glass-hover);
        box-shadow: 0 14px 36px rgba(99, 102, 241, 0.18);
      }

      .tool-card:active {
        transform: none;
        box-shadow: 0 10px 30px rgba(59, 130, 246, 0.08);
      }

      .tool-icon {
        font-size: 2rem;
        margin-bottom: 0.8rem;
        color: var(--button-purple);
        transition: transform 0.3s ease;
      }

      .tool-card:hover .tool-icon { transform: scale(1.1); }

      .tool-card h3 {
        font-size: 1.1rem;
        margin-bottom: 0.8rem;
        color: var(--text-primary);
        font-weight: 600;
        line-height: 1.3;
      }

      .tool-card p {
        color: var(--text-secondary);
        margin-bottom: 1rem;
        line-height: 1.4;
        font-size: 0.8rem;
        flex-grow: 1;
      }

      .tool-button {
        background: var(--button-purple);
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
        margin-top: auto;
      }

      .tool-button:hover {
        background: #5855eb;
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(99, 102, 241, 0.3);
      }

      @media (max-width: 1024px) {
        .tools-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 1rem;
        }
        .services { min-height: 55vh; padding-bottom: 50px; }
      }

      @media (max-width: 768px) {
        .services { min-height: auto; padding: 20px 0 40px 0; }
        .tools-grid {
          grid-template-columns: 1fr;
          gap: 0.8rem;
        }
        .tool-card { padding: 1.2rem; }
      }
    </style>
  </head>
  <body>
    <div class="theme-toggle-container">
      <button class="menu-item-circle" id="themeToggleItem" aria-label="Toggle dark mode">
        <svg class="theme-icon sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" />
          <path
            d="M12 1v4m0 14v4M1 12h4m14 0h4M4.22 4.22l2.83 2.83m10.9 10.9l2.83 2.83M4.22 19.78l2.83-2.83m10.9-10.9l2.83-2.83"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
        <svg class="theme-icon moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>
      <a class="menu-item-circle back-link" href="/" aria-label="Back to home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M15 6l-6 6 6 6M9 12h12"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
    </div>

    <a class="menu-item-circle login-link" href="/login" aria-label="Login">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path
          d="M20 21a8 8 0 10-16 0M12 11a4 4 0 100-8 4 4 0 000 8z"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </a>

    <canvas id="bg-particles" aria-hidden="true"></canvas>

    <section class="hero">
      <div class="hero-content">
        <div class="hero-logo">
          <div class="logo-geometric"></div>
        </div>
        <h1 class="hero-title">Tierlists</h1>
        <div class="hero-buttons"></div>
      </div>
    </section>

    <section class="services">
      <div class="container">
        <div class="tools-grid">
          <div class="tool-card">
            <div class="tool-icon"><i class="fa-solid fa-tv" aria-hidden="true"></i></div>
            <h3>Anime</h3>
            <p>Browse and rank our anime collection.</p>
            <button class="tool-button" onclick="window.location.href='/tier/anime'">View Anime List</button>
          </div>

          <div class="tool-card">
            <div class="tool-icon"><i class="fa-solid fa-film" aria-hidden="true"></i></div>
            <h3>Series</h3>
            <p>Browse and rank our series collection.</p>
            <button class="tool-button" onclick="window.location.href='/tier/series'">View Series List</button>
          </div>

          <div class="tool-card">
            <div class="tool-icon"><i class="fa-solid fa-gamepad" aria-hidden="true"></i></div>
            <h3>Games</h3>
            <p>Browse and rank our games collection.</p>
            <button class="tool-button" onclick="window.location.href='/tier/games'">View Games List</button>
          </div>
        </div>
      </div>
    </section>

    <script src="../particles.js"></script>
    <script>
      const THEME_KEY = "darkMode";
      const saved = localStorage.getItem(THEME_KEY);
      if (saved === "true") document.body.classList.add("dark-mode");
      const toggle = document.getElementById("themeToggleItem");
      if (toggle) {
        toggle.addEventListener("click", () => {
          document.body.classList.toggle("dark-mode");
          localStorage.setItem(THEME_KEY, document.body.classList.contains("dark-mode"));
        });
      }
    </script>
  </body>
</html>
